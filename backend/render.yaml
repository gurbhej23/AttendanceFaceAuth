services:
  - type: web
    name: attendance-backend
    runtime: python
    rootDir: backend
    buildCommand: chmod +x build.sh && ./build.sh
    # Daphne (ASGI) is required for WebSocket call/chat signaling. Gunicorn WSGI cannot upgrade connections.
    startCommand: daphne -b 0.0.0.0 -p $PORT config.asgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: PIP_DEFAULT_TIMEOUT
        value: 100
      - key: RENDER
        value: "true"
      # Optional: attach a Render Redis instance and set REDIS_URL for multi-instance channel layers.
      # - key: REDIS_URL
      #   fromService:
      #     type: redis
      #     name: attendance-redis
      #     property: connectionString
