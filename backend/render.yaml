services:
  - type: web
    name: attendance-backend
    runtime: python
    rootDir: backend
    buildCommand: chmod +x build.sh && ./build.sh
    # Gunicorn binds PORT immediately; UvicornWorker serves ASGI/WebSockets.
    startCommand: ./start.sh
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: PIP_DEFAULT_TIMEOUT
        value: 100
      - key: RENDER
        value: "true"
      # Optional: attach a Render Redis instance and set REDIS_URL for multi-instance channel layers.
      # - key: REDIS_URL
      #   fromService:
      #     type: redis
      #     name: attendance-redis
      #     property: connectionString
