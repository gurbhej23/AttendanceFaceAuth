services:
  - type: web
    name: attendance-backend
    runtime: python
    rootDir: backend
    buildCommand: chmod +x build.sh && ./build.sh
    # Daphne serves WebSockets reliably on Render.
    startCommand: ./start.sh
    healthCheckPath: /
    healthCheckGracePeriod: 300
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: PIP_DEFAULT_TIMEOUT
        value: 100
      - key: RENDER
        value: "true"
      - key: SERVE_MEDIA
        value: "true"
      # Mount a Render persistent disk at /var/data/media and uncomment:
      # - key: MEDIA_ROOT
      #   value: /var/data/media
      # Add your live Vercel URL(s), comma-separated:
      # - key: FRONTEND_ORIGINS
      #   value: "https://your-app.vercel.app"
      - key: WEB_CONCURRENCY
        value: "1"
      - key: FORWARDED_ALLOW_IPS
        value: "*"
      # Optional: comma-separated Vercel URL(s) for WebSocket origin check
      # - key: CHANNEL_ALLOWED_ORIGINS
      #   value: "https://attendance-face-auth.vercel.app"
      # Optional: attach a Render Redis instance and set REDIS_URL for multi-instance channel layers.
      # - key: REDIS_URL
      #   fromService:
      #     type: redis
      #     name: attendance-redis
      #     property: connectionString
