<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Dark background -->
  <rect width="64" height="64" rx="14" fill="#0f172a"/>

  <!-- Face circle -->
  <circle cx="32" cy="26" r="16" fill="none" stroke="#3b82f6" stroke-width="2.5"/>

  <!-- Scan line -->
  <line x1="18" y1="26" x2="46" y2="26" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.9"/>

  <!-- Corner brackets -->
  <path d="M18 12 L18 18 M18 12 L24 12" fill="none" stroke="#22d3ee" stroke-width="2" stroke-linecap="round"/>
  <path d="M46 12 L46 18 M46 12 L40 12" fill="none" stroke="#22d3ee" stroke-width="2" stroke-linecap="round"/>
  <path d="M18 40 L18 34 M18 40 L24 40" fill="none" stroke="#22d3ee" stroke-width="2" stroke-linecap="round"/>
  <path d="M46 40 L46 34 M46 40 L40 40" fill="none" stroke="#22d3ee" stroke-width="2" stroke-linecap="round"/>

  <!-- Eyes -->
  <circle cx="25" cy="23" r="2.5" fill="#3b82f6"/>
  <circle cx="39" cy="23" r="2.5" fill="#3b82f6"/>
  <!-- Eye shine -->
  <circle cx="26" cy="22" r="1" fill="#bfdbfe"/>
  <circle cx="40" cy="22" r="1" fill="#bfdbfe"/>

  <!-- Smile -->
  <path d="M25 31 Q32 37 39 31" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>

  <!-- Verified check circle -->
  <circle cx="32" cy="51" r="9" fill="#16a34a" opacity="0.2"/>
  <circle cx="32" cy="51" r="9" fill="none" stroke="#22c55e" stroke-width="2"/>
  <path d="M27 51 L30.5 54.5 L37 47" fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
